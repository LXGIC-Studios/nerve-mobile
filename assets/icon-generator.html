<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { width: 1024px; height: 1024px; overflow: hidden; background: #07080A; }
  .container {
    width: 1024px;
    height: 1024px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 224px;
    overflow: hidden;
    background: #07080A;
  }
  /* Subtle radial glow behind the N */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.12) 0%, rgba(0,229,255,0.03) 50%, transparent 70%);
  }
  /* The N letterform — geometric, angular */
  .n-mark {
    position: relative;
    z-index: 2;
  }
  svg {
    filter: drop-shadow(0 0 40px rgba(0,229,255,0.25));
  }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="n-mark">
    <svg width="520" height="580" viewBox="0 0 520 580" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Geometric N: left vertical, diagonal, right vertical -->
      <!-- Left vertical stroke -->
      <path d="M40 560 L40 20 L120 20 L120 560 Z" fill="#00E5FF"/>
      <!-- Diagonal stroke connecting top-left to bottom-right -->
      <path d="M120 20 L400 560 L480 560 L480 480 L200 20 Z" fill="#00E5FF"/>
      <!-- Right vertical stroke -->
      <path d="M400 20 L480 20 L480 560 L400 560 Z" fill="#00E5FF"/>
    </svg>
  </div>
</div>
</body>
</html>
